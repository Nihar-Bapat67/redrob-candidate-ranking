# Compute environment (actual)
# ============================================================================
compute:
  platform: "Local Windows laptop"
  cpu_cores: 12
  ram_gb: 16
  python_version: "3.11.9"
  os: "Windows 11"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true              # FAISS index + LightGBM ranker built offline
  pre_computation_time_minutes: 60            # ~45m embeddings + labeling/training

# ============================================================================
# AI tools declaration (honest)
# ============================================================================
ai_tools_used:
  - "Claude"        # code, and as the offline relevance-labeling oracle (pre-compute only)
  - "Groq (Llama 3.3 70B)"   # offline bulk relevance labeling (pre-compute only)

ai_usage_summary: |
  AI was used (a) as a development assistant for code  and
  (b) as an OFFLINE labeling oracle during pre-computation: Claude and Groq's
  Llama-3.3-70B rated candidate-JD relevance (0-5) to train the LightGBM ranker.
  No LLM/API is called during the ranking step (rank.py) — it is fully offline,
  CPU-only, no network. Candidate data was sent to the labeling LLMs only during
  offline pre-computation, never at inference.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase, distillation-style ranker. OFFLINE: embed all 100k profiles with
  MiniLM-L6-v2 into a FAISS IndexFlatIP (recall); have LLMs (Claude + Groq) label
  candidate-JD relevance 0-5 using a recruiter rubric; train a LightGBM lambdarank
  model on 14 hand-engineered, JD-grounded features. INFERENCE (rank.py, <40s CPU,
  no network): embed the JD, FAISS-retrieve top 500, compute features, LightGBM
  re-rank, demote honeypots, emit top 100. The dataset is a keyword trap (skills
  are random noise), so the decisive feature is domain_fit built from titles +
  career descriptions, not skill overlap; an HR Manager with AI skills scores ~0.09
  vs an ML Engineer ~0.90. A deterministic Stage-2 coherence validator flags
  impossible profiles (honeypots) via arithmetic checks, not ML. Reasoning is
  produced by rank-aware slot-filling from extracted facts — no runtime LLM, so it
  cannot hallucinate.

# ============================================================================
# Declarations
